[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@openzeppelin-upgradeable/=lib/openzeppelin-contracts-upgradeable/",
]

[profile.default.fuzz]
runs = 1000
seed = "0xdeadbeef"

[profile.default.invariant]
runs = 256
depth = 15
call_override = false

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 1000 }

[profile.default.fmt]
line_length = 100
tab_width = 4
quote_style = "double"
number_underscore = "thousands"
bracket_spacing = true

[rpc_endpoints]
avalanche_fuji = "${FUJI_RPC_URL}"
avalanche_mainnet = "${MAINNET_RPC_URL}"
local = "http://127.0.0.1:8545"
veraflow_local = "http://127.0.0.1:9650/ext/bc/C/rpc"

[etherscan]
avalanche_fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api-testnet.snowtrace.io/api" }
avalanche_mainnet = { key = "${SNOWTRACE_API_KEY}", url = "https://api.snowtrace.io/api" }
[lint]
exclude_lints = ["mixed-case-variable"]
