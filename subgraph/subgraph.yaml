specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: CredentialRegistry
    network: fuji
    source:
      address: "0x7dC6eE61c094C794131fC4181e4B35Bcf1a63Dad"
      abi: CredentialRegistry
      startBlock: 38000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Institution
        - Credential
        - Worker
        - ProtocolStats
      abis:
        - name: CredentialRegistry
          file: ./abis/CredentialRegistry.json
      eventHandlers:
        - event: InstitutionApplied(indexed address,string,string,uint48)
          handler: handleInstitutionApplied
        - event: InstitutionApproved(indexed address,uint8,uint48)
          handler: handleInstitutionApproved
        - event: InstitutionRevoked(indexed address,address,string)
          handler: handleInstitutionRevoked
        - event: InstitutionTrustLevelUpdated(indexed address,uint8,uint8)
          handler: handleInstitutionTrustLevelUpdated
        - event: CredentialIssued(indexed address,indexed address,indexed uint256,uint8)
          handler: handleCredentialIssued
      file: ./src/mappings.ts

  - kind: ethereum
    name: SoulboundCredential
    network: fuji
    source:
      address: "0xdc7041742002F70ec635015b2e10FE52dD406A3D"
      abi: SoulboundCredential
      startBlock: 38000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Credential
      abis:
        - name: SoulboundCredential
          file: ./abis/SoulboundCredential.json
      eventHandlers:
        - event: CredentialRevoked(indexed uint256,indexed address,indexed address,string)
          handler: handleCredentialRevoked
      file: ./src/mappings.ts

  - kind: ethereum
    name: WorkerIdentity
    network: fuji
    source:
      address: "0x7C937A7E3C1c7C6D1776f69650Bfd1516103F766"
      abi: WorkerIdentity
      startBlock: 38000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Worker
      abis:
        - name: WorkerIdentity
          file: ./abis/WorkerIdentity.json
      eventHandlers:
        - event: IdentityRegistered(indexed address,indexed bytes32,uint48)
          handler: handleIdentityRegistered
        - event: StatusChanged(indexed address,uint8,uint8,address)
          handler: handleIdentityStatusChanged
        - event: ReputationScoreUpdated(indexed address,uint32,uint32)
          handler: handleReputationScoreUpdated
        - event: ProfileUpdated(indexed address,bytes32,bytes32)
          handler: handleProfileUpdated
      file: ./src/mappings.ts

  - kind: ethereum
    name: LendingPool
    network: fuji
    source:
      address: "0x04DD8F6Ec0B13c689Ee479555910bc79B7496dCc"
      abi: LendingPool
      startBlock: 38000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Loan
        - ProtocolStats
      abis:
        - name: LendingPool
          file: ./abis/LendingPool.json
      eventHandlers:
        - event: LoanOriginated(indexed uint256,indexed address,uint256,uint256,uint48,uint32)
          handler: handleLoanOriginated
        - event: LoanFullyRepaid(indexed uint256,indexed address,uint48)
          handler: handleLoanRepaid
        - event: LoanDefaulted(indexed uint256,indexed address,uint256,uint48)
          handler: handleLoanDefaulted
      file: ./src/mappings.ts

  - kind: ethereum
    name: IssuerGovernance
    network: fuji
    source:
      address: "0xcBaB6c09fC25eF215a0eE00C5481E8d5195fee4a"
      abi: IssuerGovernance
      startBlock: 38000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
      abis:
        - name: IssuerGovernance
          file: ./abis/IssuerGovernance.json
      eventHandlers:
        - event: ProposalCreated(indexed uint256,uint8,indexed address,address,uint48)
          handler: handleProposalCreated
        - event: VoteCast(indexed uint256,indexed address,uint32,uint32)
          handler: handleVoteCast
        - event: ProposalExecuted(indexed uint256,uint8,indexed address,address)
          handler: handleProposalExecuted
      file: ./src/mappings.ts

  - kind: ethereum
    name: DisputeResolver
    network: fuji
    source:
      address: "0x112BfE9b03AB35146463632b15e5fB220278418B"
      abi: DisputeResolver
      startBlock: 38000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Dispute
      abis:
        - name: DisputeResolver
          file: ./abis/DisputeResolver.json
      eventHandlers:
        - event: DisputeRaised(indexed uint256,uint8,indexed address,indexed address,uint256,uint256)
          handler: handleDisputeRaised
        - event: DisputeUpheld(indexed uint256,indexed address,string)
          handler: handleDisputeUpheld
        - event: DisputeDismissed(indexed uint256,indexed address,string)
          handler: handleDisputeDismissed
      file: ./src/mappings.ts
